services:
  # ── 后端：FastAPI + WebSocket + 你的热榜 Agent ────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: gpt-researcher-hot-backend
    container_name: hot-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      FAST_LLM: ${FAST_LLM:-openai:LongCat-2.0}
      SMART_LLM: ${SMART_LLM:-openai:LongCat-2.0}
      RETRIEVER: ${RETRIEVER:-duckduckgo}
      TONE: ${TONE:-Objective}
      WORKERS: ${WORKERS:-1}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
    volumes:
      - ./backend:/app/backend:rw
      - ./my-docs:/app/my-docs:rw
      - ./outputs:/app/outputs:rw
      - ./logs:/app/logs:rw
    restart: unless-stopped
    networks:
      - app-net

  # ── 前端：Next.js 14 ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/nextjs
      dockerfile: Dockerfile
    image: gpt-researcher-hot-frontend
    container_name: hot-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: ws://localhost:8001
      NEXT_PUBLIC_GPTR_API_URL: http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-net

  # ── MCP 服务器（可选，给外部 Agent 调用）────────────────────
  mcp:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: gpt-researcher-hot-mcp
    container_name: hot-mcp
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      FAST_LLM: ${FAST_LLM:-openai:LongCat-2.0}
      SMART_LLM: ${SMART_LLM:-openai:LongCat-2.0}
      RETRIEVER: ${RETRIEVER:-duckduckgo}
    command: ["python", "backend/mcp_servers/hot_list_server.py", "--transport", "http", "--port", "8002"]
    restart: unless-stopped
    networks:
      - app-net
    profiles:
      - mcp   # docker compose --profile mcp up 才会启动

networks:
  app-net:
    driver: bridge
